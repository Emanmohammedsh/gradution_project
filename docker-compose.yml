version: '3.9'

services:
  backend:
    build: .
    container_name: redteam-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///database/redteam.db
      - API_HOST=0.0.0.0
      - API_PORT=8000
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./reports:/app/reports
      - ./database:/app/database
    restart: unless-stopped

  # Uncomment for PostgreSQL instead of SQLite:
